<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content modal-card shadow-lg border-0">

      <!-- HEADER -->
      <div class="modal-header border-0 pb-0">
        <div>
          <h5 class="modal-title fw-bold text-orange">Gestión de Categorías</h5>
          <small class="text-muted">Administra las categorías de productos</small>
        </div>
        <button type="button" class="btn-close" (click)="cerrarModal()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body pt-3">

        <!-- FORM -->
        <div class="card border-0 shadow-sm mb-3 rounded-4">
          <div class="card-body p-3">

            <form (ngSubmit)="guardarCategoria()">
              <div class="row g-3 align-items-end">

                <div class="col-md-4">
                  <label class="form-label fw-semibold small">Nombre</label>
                  <input type="text"
                         class="form-control form-control-sm rounded-3"
                         [(ngModel)]="form.nombreCategoria"
                         name="nombre"
                         placeholder="Ej: Smartphones">
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-semibold small">Descripción</label>
                  <input type="text"
                         class="form-control form-control-sm rounded-3"
                         [(ngModel)]="form.descripcionCategoria"
                         name="descripcion"
                         placeholder="Ej: Dispositivos móviles">
                </div>

                <div class="col-md-2 text-end">
                  <button type="submit"
                          class="btn btn-orange w-100 btn-sm fw-semibold">
                    <i class="bi me-1"
                       [ngClass]="editando ? 'bi-check-circle' : 'bi-plus-circle'"></i>
                    {{ editando ? 'Actualizar' : 'Agregar' }}
                  </button>
                </div>

              </div>
            </form>

          </div>
        </div>

        <!-- TABLA -->
        <div class="table-responsive rounded-4 shadow-sm">

          <table class="table align-middle mb-0 table-hover">
            <thead class="table-light text-center small">
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let c of categoriasPagina; let i = index">

                <td class="text-center text-muted">
                  {{ (paginaActual - 1) * tamanioPagina + i + 1 }}
                </td>

                <td class="fw-semibold">
                  {{ c.nombreCategoria }}
                </td>

                <td class="text-muted small">
                  {{ c.descripcionCategoria }}
                </td>

                <td class="text-end">
                  <div class="d-inline-flex gap-2">

                    <button class="btn btn-outline-orange btn-sm rounded-circle"
                            (click)="editar(c)">
                      <i class="bi bi-pencil"></i>
                    </button>

                    <button class="btn btn-outline-danger btn-sm rounded-circle"
                            (click)="eliminar(c)"
                            [disabled]="c.tieneProductos"
                            [class.opacity-50]="c.tieneProductos"
                            title="{{ c.tieneProductos ? 'Esta categoría tiene productos asociados' : 'Eliminar' }}">
                      <i class="bi bi-trash"></i>
                    </button>

                  </div>
                </td>

              </tr>
            </tbody>
          </table>

        </div>

        <!-- PAGINACIÓN -->
        <nav *ngIf="totalPaginas > 1" class="mt-3 d-flex justify-content-end">
          <ul class="pagination pagination-sm mb-0">

            <li class="page-item" [class.disabled]="paginaActual === 1">
              <button class="page-link" (click)="cambiarPagina(paginaActual - 1)">
                <i class="bi bi-chevron-left"></i>
              </button>
            </li>

            <li class="page-item"
                *ngFor="let p of [].constructor(totalPaginas); let idx = index"
                [class.active]="paginaActual === (idx + 1)">
              <button class="page-link" (click)="cambiarPagina(idx + 1)">
                {{ idx + 1 }}
              </button>
            </li>

            <li class="page-item" [class.disabled]="paginaActual === totalPaginas">
              <button class="page-link" (click)="cambiarPagina(paginaActual + 1)">
                <i class="bi bi-chevron-right"></i>
              </button>
            </li>

          </ul>
        </nav>

      </div>

      <div class="modal-footer border-0 pt-2">
        <button type="button" class="btn btn-light btn-sm px-4 rounded-pill" (click)="cerrarModal()">
          <i class="bi bi-x-circle me-1"></i> Cerrar
        </button>
      </div>

    </div>
  </div>
</div>
