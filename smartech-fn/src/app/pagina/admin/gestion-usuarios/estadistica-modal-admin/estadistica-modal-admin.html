<div class="modal-backdrop" (click)="cerrar()"></div>

<div class="modal-content-admin animate__animated animate__fadeInUp">

    <div class="header">
        <h3>
            <i class="bi bi-graph-up-arrow icon-title"></i>
            Estadísticas de Ventas
        </h3>

        <button class="btn-close" (click)="cerrar()"></button>
    </div>

    <div class="body">

        <div *ngIf="cargando" class="loader-container">
            <div class="loader"></div>
            <p>Cargando estadísticas...</p>
        </div>

        <div *ngIf="!cargando && datos.length === 0" class="nodata">
            <img src="https://cdn-icons-png.flaticon.com/512/4076/4076409.png" alt="No data">
            <h4>Sin registros disponibles</h4>
            <p>Este usuario aún no tiene ventas registradas en tienda.</p>
        </div>

        <div *ngIf="datos.length > 0">
            <canvas #ventasChart id="ventasChart"></canvas>
        </div>

    </div>

</div>
