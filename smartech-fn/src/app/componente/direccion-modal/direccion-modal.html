<div class="modal fade show d-block custom-backdrop" *ngIf="visible">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow rounded-4 p-3">

      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-orange">Añadir nueva dirección</h5>
        <button type="button" class="btn-close" (click)="cerrarModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Departamento <span class="text-danger">*</span></label>
              <input formControlName="departamento" class="form-control rounded-3"
                placeholder="Ingresa Departamento"
                [class.is-invalid]="form.get('departamento')?.invalid && form.get('departamento')?.touched">
              <div class="invalid-feedback">Departamento es obligatorio</div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Provincia <span class="text-danger">*</span></label>
              <input formControlName="provincia" class="form-control rounded-3"
                placeholder="Ingresa Provincia"
                [class.is-invalid]="form.get('provincia')?.invalid && form.get('provincia')?.touched">
              <div class="invalid-feedback">Provincia es obligatoria</div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Distrito <span class="text-danger">*</span></label>
              <input formControlName="distrito" class="form-control rounded-3"
                placeholder="Ingresa Distrito"
                [class.is-invalid]="form.get('distrito')?.invalid && form.get('distrito')?.touched">
              <div class="invalid-feedback">Distrito es obligatorio</div>
            </div>

            <div class="col-md-8">
              <label class="form-label">Avenida / Calle / Jr <span class="text-danger">*</span></label>
              <input formControlName="via" class="form-control rounded-3"
                placeholder="Av. Ejemplo 123"
                [class.is-invalid]="form.get('via')?.invalid && form.get('via')?.touched">
              <div class="invalid-feedback">La vía es obligatoria</div>
            </div>

            <div class="col-md-4">
              <label class="form-label">Número</label>
              <input formControlName="numero" class="form-control rounded-3">
              <div class="form-check mt-1">
                <input type="checkbox" class="form-check-input" formControlName="sinNumero">
                <label class="form-check-label small">Sin número</label>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Piso / Dpto <span class="text-muted">(Opcional)</span></label>
              <input formControlName="piso" class="form-control rounded-3" placeholder="Piso 2, Dpto 201">
            </div>

            <div class="col-md-6">
              <label class="form-label">Referencia</label>
              <input formControlName="referencia" class="form-control rounded-3"
                placeholder="Frente a tienda…" />
            </div>

          </div>

          <div class="bg-light rounded-4 p-3 mt-4 d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">¿Quién recibe?</div>
              <small class="text-muted">{{ nombreCliente }}</small>
            </div>
            <a href="javascript:void(0)" class="text-orange fw-semibold" (click)="toggleReceptor()">
              Cambiar
            </a>
          </div>

          <div *ngIf="cambiarReceptor" class="mt-3">
            <label class="form-label fw-semibold">
              Nombre nuevo receptor <span class="text-danger">*</span>
            </label>
            <input formControlName="nombreReceptor" class="form-control rounded-3"
              placeholder="Nombre completo"
              [class.is-invalid]="form.get('nombreReceptor')?.invalid && form.get('nombreReceptor')?.touched">
            <div class="invalid-feedback">Debe ingresar el nombre del receptor</div>
          </div>

        </form>
      </div>

      <!-- Footer -->
      <div class="modal-footer border-0 d-flex justify-content-between mt-4">
        <button class="btn btn-dark rounded-3 px-4" (click)="cerrarModal()">Volver</button>
        <button class="btn btn-orange rounded-3 px-5 fw-bold text-white" (click)="continuar()">
          Continuar
        </button>
      </div>
    </div>
  </div>
</div>
