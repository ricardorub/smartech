version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smartech-db
    restart: always
    environment:
      MYSQL_DATABASE: dbsmartech
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: SmarTech-bk/Dockerfile
    container_name: smartech-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/dbsmartech?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: smartech-fn/Dockerfile
    container_name: smartech-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      PORT: 80
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  db_data:
